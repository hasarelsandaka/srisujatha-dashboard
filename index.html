<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Sujatha Student Database</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #4e73df; --bg-color: #f8f9fc; --sidebar-color: #224abe; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); overflow-x: hidden; }
        .sidebar { height: 100vh; background: linear-gradient(180deg, var(--sidebar-color) 10%, #1a3a9e 100%); color: white; position: fixed; width: 250px; padding-top: 20px; z-index: 1000; transition: 0.3s; }
        .sidebar .nav-link { color: rgba(255,255,255,0.7); border-radius: 5px; margin: 5px 15px; padding: 12px; transition: 0.3s; cursor: pointer; display: flex; align-items: center; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: white; background: rgba(255,255,255,0.1); }
        .main-content { margin-left: 250px; padding: 30px; min-height: 100vh; }
        .table-container { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e3e6f0; }
        .grade-card { cursor: pointer; transition: 0.3s; border: 1px solid #e3e6f0; border-radius: 12px; background: white; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .grade-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: var(--primary-color); }
        .house-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .house-sila { background: #e3f2fd; color: #1976d2; }
        .house-samadhi { background: #fff3e0; color: #ef6c00; }
        .house-pragna { background: #f1f8e9; color: #388e3c; }
        .hidden { display: none !important; }
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        @media (max-width: 768px) { .sidebar { width: 0; display: none; } .main-content { margin-left: 0; } }
    </style>
</head>
<body>

<div id="loader" class="loader-overlay hidden">
    <div class="spinner-border text-primary"></div>
    <div class="mt-3 fw-bold text-primary" id="loader-text">පද්ධතිය ක්‍රියාත්මක වේ...</div>
</div>

<div class="sidebar">
    <div class="text-center mb-4">
        <i class="fas fa-graduation-cap fa-3x mb-2 text-white"></i>
        <h5 class="fw-bold mb-0">SRI SUJATHA</h5>
        <p class="small opacity-75">STUDENT DATABASE</p>
    </div>
    <nav class="nav flex-column">
        <div class="nav-link active" onclick="switchView('dashboard')" id="link-dash"><i class="fas fa-home me-2"></i> Dashboard</div>
        <div class="nav-link" onclick="switchView('classes')" id="link-classes"><i class="fas fa-users me-2"></i> Classes (පන්ති)</div>
    </nav>
</div>

<div class="main-content">
    
    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-dark">Dashboard</h3>
            <div>
                <input type="file" id="csvInput" accept=".csv" class="hidden" onchange="handleCSV(this)">
                <button class="btn btn-primary" onclick="document.getElementById('csvInput').click()"><i class="fas fa-upload me-1"></i> Import CSV</button>
                <button class="btn btn-danger ms-2" onclick="deleteAllData()"><i class="fas fa-trash me-1"></i> සියල්ල මකන්න</button>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-6"><div class="card p-3 border-0 border-start border-4 border-primary shadow-sm"><p class="text-muted small mb-1">මුළු ශිෂ්‍ය සංඛ්‍යාව</p><h2 class="fw-bold mb-0" id="total-students">0</h2></div></div>
            <div class="col-md-6"><div class="card p-3 border-0 border-start border-4 border-success shadow-sm"><p class="text-muted small mb-1">සක්‍රීය ශ්‍රේණි</p><h2 class="fw-bold mb-0" id="total-grades">0</h2></div></div>
        </div>

        <div class="table-container">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold m-0">සියලුම සිසුන්</h5>
                <input type="text" id="dashSearch" class="form-control w-25 shadow-sm" placeholder="සෙවීම...">
            </div>
            <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
                <table class="table table-hover">
                    <thead class="table-light sticky-top">
                        <tr>
                            <th>ශ්‍රේණිය</th>
                            <th>අංකය</th>
                            <th>නම</th>
                            <th>නිවාසය</th>
                            <th>ක්‍රියා</th>
                        </tr>
                    </thead>
                    <tbody id="dash-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- CLASSES VIEW -->
    <div id="classes-view" class="hidden">
        <div id="grades-grid-container">
            <h3 class="fw-bold text-dark mb-4">ශ්‍රේණිය තෝරන්න</h3>
            <div class="row g-3" id="grades-grid"></div>
        </div>

        <div id="class-detail" class="hidden">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <button class="btn btn-sm btn-outline-secondary mb-2" onclick="backToGrades()"><i class="fas fa-arrow-left"></i> පසුපසට</button>
                    <h3 class="fw-bold mb-0" id="current-class-title">Grade 7</h3>
                </div>
                <span class="badge bg-primary fs-6" id="class-count">0 Students</span>
            </div>
            <div class="table-container">
                <div class="table-responsive">
                    <table class="table table-bordered align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>අංකය</th>
                                <th>නම</th>
                                <th>නිවාසය</th>
                                <th>WhatsApp</th>
                                <th>මකන්න</th>
                            </tr>
                        </thead>
                        <tbody id="class-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, doc, deleteDoc, query, orderBy, onSnapshot, getDocs, writeBatch, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDCh27_ET3I_ovDyhhxCJr2yeMH3YnC1Pc",
        authDomain: "srisujathadb.firebaseapp.com",
        projectId: "srisujathadb",
        storageBucket: "srisujathadb.firebasestorage.app",
        messagingSenderId: "907198039870",
        appId: "1:907198039870:web:6209a0d295bbf6e7000e6f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "students");
    
    let allStudents = [];

    const toggleLoader = (show, text = "") => {
        const l = document.getElementById('loader');
        if(text) document.getElementById('loader-text').innerText = text;
        l.classList.toggle('hidden', !show);
    };

    window.switchView = (view) => {
        document.getElementById('dashboard-view').classList.toggle('hidden', view !== 'dashboard');
        document.getElementById('classes-view').classList.toggle('hidden', view !== 'classes');
        document.getElementById('link-dash').classList.toggle('active', view === 'dashboard');
        document.getElementById('link-classes').classList.toggle('active', view === 'classes');
    };

    const renderGrades = () => {
        const grid = document.getElementById('grades-grid');
        const grades = Array.from({length: 13}, (_, i) => `Grade ${i+1}`);
        grid.innerHTML = grades.map(g => `
            <div class="col-md-3 col-6">
                <div class="grade-card shadow-sm" onclick="showClassDetail('${g}')">
                    <i class="fas fa-folder fa-2x mb-2 text-warning"></i>
                    <span class="fw-bold">${g}</span>
                </div>
            </div>
        `).join('');
    };
    renderGrades();

    window.showClassDetail = (gradeName) => {
        document.getElementById('current-class-title').innerText = gradeName;
        document.getElementById('grades-grid-container').classList.add('hidden');
        document.getElementById('class-detail').classList.remove('hidden');
        renderClassTable(gradeName);
    };

    const renderClassTable = (grade) => {
        const filtered = allStudents.filter(s => s.grade === grade).sort((a,b) => a.studentID - b.studentID);
        const tbody = document.getElementById('class-tbody');
        tbody.innerHTML = "";
        document.getElementById('class-count').innerText = `${filtered.length} Students`;
        
        filtered.forEach(s => {
            tbody.innerHTML += `
                <tr>
                    <td>${s.studentID}</td>
                    <td class="fw-bold">${s.name}</td>
                    <td><span class="house-badge ${getHouseClass(s.house)}">${s.house}</span></td>
                    <td>${s.phone || '-'}</td>
                    <td><button class="btn btn-sm btn-outline-danger" onclick="deleteStudent('${s.id}')"><i class="fas fa-trash"></i></button></td>
                </tr>`;
        });
    };

    window.backToGrades = () => {
        document.getElementById('grades-grid-container').classList.remove('hidden');
        document.getElementById('class-detail').classList.add('hidden');
    };

    const getHouseName = (id, csvHouse = "") => {
        if (csvHouse && csvHouse.trim() !== "") return csvHouse.trim();
        const num = parseInt(id) % 3;
        if(num === 0) return "සීල";
        if(num === 1) return "සමාධි";
        return "ප්‍රඥා";
    };

    const getHouseClass = (h) => {
        if(h === "සීල") return "house-sila";
        if(h === "සමාධි") return "house-samadhi";
        return "house-pragna";
    };

    onSnapshot(query(colRef, orderBy("createdAt", "desc")), (snap) => {
        allStudents = [];
        const gradesSet = new Set();
        snap.forEach(doc => {
            const data = { id: doc.id, ...doc.data() };
            allStudents.push(data);
            gradesSet.add(data.grade);
        });
        renderDashboardTable(allStudents);
        document.getElementById('total-students').innerText = allStudents.length;
        document.getElementById('total-grades').innerText = gradesSet.size;
        
        // If viewing a class, refresh it
        const currentTitle = document.getElementById('current-class-title').innerText;
        if(!document.getElementById('class-detail').classList.contains('hidden')) {
            renderClassTable(currentTitle);
        }
    });

    const renderDashboardTable = (data) => {
        const tbody = document.getElementById('dash-tbody');
        tbody.innerHTML = data.slice(0, 100).map(s => `
            <tr>
                <td><span class="badge bg-light text-dark border">${s.grade}</span></td>
                <td class="fw-bold">${s.studentID}</td>
                <td>${s.name}</td>
                <td><span class="house-badge ${getHouseClass(s.house)}">${s.house}</span></td>
                <td><button class="btn btn-sm text-danger" onclick="deleteStudent('${s.id}')"><i class="fas fa-trash"></i></button></td>
            </tr>
        `).join('');
    };

    window.handleCSV = (input) => {
        const file = input.files[0];
        if(!file) return;

        const gradeName = prompt("මෙම CSV ගොනුවේ ඇති සියලුම සිසුන් අයත් වන පන්තිය කුමක්ද? (උදා: Grade 7)", "Grade 7");
        if(!gradeName) return;

        toggleLoader(true, "දත්ත පද්ධතියට එක් කරමින්...");
        const reader = new FileReader();
        reader.onload = async (e) => {
            const lines = e.target.result.split('\n');
            const batch = writeBatch(db);
            let count = 0;

            for(let i = 2; i < lines.length; i++) { // Header skip
                const cols = lines[i].split(',');
                if(cols.length < 2) continue;

                const sid = cols[0]?.trim(); // ඇතුළත් වීමේ අංකය (ID)
                const name = cols[1]?.trim(); // නම
                const phone = cols[5]?.trim(); // WhatsApp Number
                const house = cols[7]?.trim(); // නිවාසය

                if(!sid || !name) continue;

                const newRef = doc(colRef);
                batch.set(newRef, {
                    studentID: sid,
                    name: name,
                    phone: phone || "",
                    grade: gradeName,
                    house: getHouseName(sid, house),
                    createdAt: new Date()
                });
                count++;
                if(count % 400 === 0) await batch.commit();
            }
            await batch.commit();
            toggleLoader(false);
            alert(`සාර්ථකයි! සිසුන් ${count} දෙනෙකු පද්ධතියට එක් කළා.`);
            input.value = "";
        };
        reader.readAsText(file);
    };

    document.getElementById('dashSearch').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        const filtered = allStudents.filter(s => s.name.toLowerCase().includes(val) || s.studentID.toString().includes(val) || s.grade.toLowerCase().includes(val));
        renderDashboardTable(filtered);
    });

    window.deleteStudent = async (id) => {
        if(confirm("මකා දැමීමට අවශ්‍යද?")) {
            toggleLoader(true, "මකා දමමින්...");
            await deleteDoc(doc(db, "students", id));
            toggleLoader(false);
        }
    };

    window.deleteAllData = async () => {
        if(confirm("සියලුම දත්ත මකා දැමීමට අවශ්‍යද?")) {
            toggleLoader(true, "සියල්ල මකා දමමින්...");
            const snap = await getDocs(colRef);
            const batch = writeBatch(db);
            snap.forEach(d => batch.delete(d.ref));
            await batch.commit();
            toggleLoader(false);
        }
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
